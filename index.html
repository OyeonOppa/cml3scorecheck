<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คเวลาเรียน</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div id="loginSection" class="section active">
            <div class="login-card">
                <h1>ระบบเช็คเวลาเรียน</h1>
                <p class="subtitle">กรุณากรอกเลขบัตรประชาชน 13 หลัก</p>
                <div class="input-group">
                    <input 
                        type="text" 
                        id="idCardInput" 
                        placeholder="เลขบัตรประชาชน"
                        maxlength="13"
                        pattern="[0-9]{13}"
                    >
                    <button id="checkBtn" onclick="checkAttendance()">เช็คข้อมูล</button>
                </div>
                <div id="errorMsg" class="error-msg"></div>
                <div id="loading" class="loading">กำลังโหลดข้อมูล...</div>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboardSection" class="section">
            <div class="dashboard">
                <!-- Student Profile -->
                <div class="profile-card">
                    <img id="studentPhoto" src="" alt="รูปนักศึกษา" class="student-photo">
                    <div class="profile-info">
                        <h2 id="studentName"></h2>
                        <p id="studentId" class="student-id"></p>
                    </div>
                    <button onclick="logout()" class="logout-btn">ออกจากระบบ</button>
                </div>

                <!-- Statistics -->
                <div class="stats-container">
                    <div class="stat-card">
                        <div class="stat-value" id="totalHours">0</div>
                        <div class="stat-label">ชั่วโมงที่เรียนแล้ว</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalHoursMax">267</div>
                        <div class="stat-label">ชั่วโมงทั้งหมด</div>
                    </div>
                    <div class="stat-card highlight">
                        <div class="stat-value" id="attendancePercent">0%</div>
                        <div class="stat-label">เปอร์เซ็นต์การเข้าเรียน</div>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="progress-container">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <p class="progress-text">
                        <span id="progressHours">0</span> / 267 ชั่วโมง
                    </p>
                </div>

                <!-- Attendance Table -->
                <div class="table-container">
                    <h3>รายการเข้าเรียน</h3>
                    <table id="attendanceTable">
                        <thead>
                            <tr>
                                <th>ลำดับ</th>
                                <th>วันที่</th>
                                <th>เวลา</th>
                                <th>สถานที่</th>
                                <th>รายละเอียด</th>
                                <th>ชั่วโมงเต็ม</th>
                                <th>ชั่วโมงที่ได้</th>
                                <th>สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceBody">
                            <!-- Data will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
